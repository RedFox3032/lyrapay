name: lyrapay
description: LyraPay — P2P Wallet for the Libyan Market
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Supabase ──────────────────────────────────────────
  supabase_flutter: ^2.3.4

  # ── State Management ──────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Routing ───────────────────────────────────────────
  go_router: ^13.2.4

  # ── HTTP ──────────────────────────────────────────────
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # ── Local Storage ─────────────────────────────────────
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ── Security ──────────────────────────────────────────
  local_auth: ^2.2.0
  flutter_jailbreak_detection: ^1.10.0
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # ── QR & Scanning ─────────────────────────────────────
  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0
  google_mlkit_text_recognition: ^0.12.0

  # ── Connectivity ──────────────────────────────────────
  internet_connection_checker_plus: ^2.4.0
  connectivity_plus: ^6.0.3

  # ── UI & Animations ───────────────────────────────────
  confetti: ^0.7.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

  # ── Forms & Input ─────────────────────────────────────
  flutter_form_builder: ^9.2.1
  form_builder_validators: ^10.0.1
  pin_code_fields: ^8.0.1

  # ── Localization & RTL ────────────────────────────────
  intl: ^0.19.0

  # ── Utilities ─────────────────────────────────────────
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^17.2.0
  share_plus: ^9.0.0
  image_picker: ^1.1.1

  # ── Environment ───────────────────────────────────────
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.3
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env.development
    - .env.production

  fonts:
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/GeneralSans-Regular.otf
        - asset: assets/fonts/GeneralSans-Medium.otf
          weight: 500
        - asset: assets/fonts/GeneralSans-Semibold.otf
          weight: 600
        - asset: assets/fonts/GeneralSans-Bold.otf
          weight: 700
        - asset: assets/fonts/GeneralSans-Extralight.otf
          weight: 200
    - family: GeneralSansMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700